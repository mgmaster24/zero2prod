#! spec.yaml
name: zero2prod
# Check https://www.digitalocean.com/docs/app-platform/#regional-availability
# for a list of all the available options.
# You can get region slugs from
# https://www.digitalocean.com/docs/platform/availability=matrix/
# They must be lowercased.
# `fra` stands for Frankfurt (Germany - EU)
region: fra
services:
  - name: zero2prod
    # Relative to the repository root
    dockerfile_path: Dockerfile
    source_dir: .
    github:
      branch: main
      deploy_on_push: true
      repo: mgmaster24/zero2prod
    # Active probe used by DigitalOcean to ensure our app is healthy
    health_check:
      # The path to our health check endpoint!
      # It turned out to be useful in the end.
      http_path: /health_check
    # The port the application will be listening on for incoming requests.
    # It should match what we specified in our configuration/prod.yaml file.
    http_port: 8000
    # For production workloads we'd go for at least two! But let's
    # try to keep the bill under control for now...
    instance_count: 1
    instance_size_slug: basic-xxs
    # All incoming requests are routed to the app
    routes:
      - path: /
databases:
  # PG = Postgres
  - engine: PG
    # Database name
    name: newsletter
    # Again, let's keep the bill lean
    num_nodes: 1
    size: db-s-dev-database
    # Postgres version
    version: "12"
